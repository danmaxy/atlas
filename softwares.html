<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas - Downloads de Softwares</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; color: #f8fafc; }
        
        .card {
            background: #1e293b;
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }

        h1 { font-size: 1.5rem; margin-bottom: 20px; text-align: center; color: #38bdf8; }

        .software-item {
            background: #334155;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        .software-info h3 { font-size: 1rem; color: #fff; }
        .software-info p { font-size: 0.8rem; color: #94a3b8; }

        .download-btn {
            background: #22c55e; /* Verde para download */
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .back-btn:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Central de Softwares</h1>

        <div class="software-item">
            <div class="software-info">
                <h3>Driver Pack 2026</h3>
                <p>Pack essencial de drivers</p>
            </div>
            <a href="LINK_DO_SEU_GOOGLE_DRIVE" target="_blank" class="download-btn">Baixar</a>
        </div>

        <div class="software-item">
            <div class="software-info">
                <h3>Otimizador Atlas</h3>
                <p>Melhora performance PC</p>
            </div>
            <a href="OUTRO_LINK_AQUI" target="_blank" class="download-btn">Baixar</a>
        </div>

        <a href="index.html" class="back-btn">← Voltar ao Início</a>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas - Soluções</title>
    <style>
        /* Reset e Base */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            background-color: #0f172a; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #f8fafc;
        }

        /* Card Principal - Pequeno ajuste para destacar a logo */
        .card {
            background: #1e293b;
            width: 100%;
            max-width: 400px;
            padding: 50px 25px 40px; /* Aumentado o padding superior */
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            border: 1px solid #334155;
            position: relative; /* Para o efeito de brilho */
        }

        /* Container da Logo - Atualizado para o novo design */
        .logo-container {
            width: 130px; /* Tamanho ideal para o novo design circular */
            height: 130px;
            margin: -20px auto 30px; /* Sobe um pouco a logo e dá espaço */
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Removemos o fundo branco e arredondamento antigo */
            background: none; 
            border-radius: 0;
            
            /* Efeito de brilho sutil atrás da logo */
            filter: drop-shadow(0 0 15px rgba(37, 99, 235, 0.4));
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Garante que a logo circular não corte */
        }

        h1 { font-size: 1.8rem; margin-bottom: 10px; letter-spacing: -0.5px; }
        p { color: #94a3b8; margin-bottom: 35px; font-size: 0.95rem; line-height: 1.5; }

        /* Botões */
        .btn-group { display: flex; flex-direction: column; gap: 14px; }

        .btn {
            display: block;
            background: rgba(51, 65, 85, 0.6); /* Mais sutil */
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn:hover { background: #334155; transform: translateY(-2px); }
        .btn:active { transform: scale(0.98); }
        
        .btn-primary { 
            background: #2563eb; 
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
            border-color: transparent;
        }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-primary:active { background: #1a45bd; }

    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            <img src="https://i.ibb.co/vzV5hM8/Atlas-Logo-V2-Premium.png" alt="Atlas - Soluções Integradas">
        </div>
        
        <h1>Bem-vindo à Atlas</h1>
        <p>Sua central de soluções técnicas<br>e performance digital.</p>

        <div class="btn-group">
            <a href="#servicos" class="btn btn-primary">Serviços</a>
            <a href="#pecas" class="btn">Peças</a>
            <a href="softwares.html" class="btn">Softwares</a>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas - Central de Softwares</title>
    <style>
        /* Base (Mesmo estilo do Index) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid #334155;
            animation: fadeIn 0.5s ease-out;
        }

        h1 { 
            font-size: 1.6rem; 
            margin-bottom: 25px; 
            text-align: center;
            color: #fff;
        }

        /* Container de Itens de Software */
        .software-item {
            background: #334155;
            padding: 16px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            transition: transform 0.2s;
        }

        .software-item:hover {
            transform: translateX(5px);
            background: #3f4e64;
        }

        .software-info h3 {
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .software-info p {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        /* Botão de Download */
        .download-btn {
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background 0.2s;
        }

        .download-btn:hover {
            background: #3b82f6;
        }

        /* Botão Voltar */
        .back-btn {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #f8fafc;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Central de Softwares</h1>

        <div class="software-item">
            <div class="software-info">
                <h3>CorelDraw</h3>
                <p>Design Gráfico e Vetorização</p>
            </div>
            <a href="https://drive.google.com/drive/folders/14bY-W11ZK5Tk2yUWwhTY5QKbhhje3OT0?usp=sharing" 
               target="_blank" 
               class="download-btn">
                Download
            </a>
        </div>

        <a href="index.html" class="back-btn">← Voltar ao Início</a>
    </div>

</body>
</html>

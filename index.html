<!DOCTYPE html> 
<html lang="pt-br"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Atlas - Soluções Técnicas</title> 
    <script src="https://unpkg.com/lucide@latest"></script> 

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"> 
     
    <style> 
        :root { 
            --bg-body: #030712; 
            --card-bg: rgba(11, 17, 34, 0.65); 
            --primary: #2563eb; 
            --primary-glow: rgba(37, 99, 235, 0.35); 
            --text-main: #f9fafb; 
            --text-muted: #9ca3af; 
            --border: rgba(255, 255, 255, 0.05); 
            --border-hover: rgba(255, 255, 255, 0.12);
        } 

        * {  
            margin: 0; padding: 0; box-sizing: border-box;  
            font-family: 'Plus Jakarta Sans', sans-serif;  
        } 
         
        body { 
            background-color: var(--bg-body); 
            background-image:  
                radial-gradient(circle at 10% 10%, rgba(37, 99, 235, 0.08) 0%, transparent 50%),  
                radial-gradient(circle at 90% 90%, rgba(29, 78, 216, 0.05) 0%, transparent 50%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 24px; 
            color: var(--text-main); 
        } 

        /* Card com design Glassmorphism Minimalista */ 
        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px); 
            width: 100%; 
            max-width: 420px; 
            padding: 56px 40px; 
            border-radius: 28px; 
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8),
                        inset 0 1px 0px 0px rgba(255, 255, 255, 0.1); 
            text-align: center; 
            border: 1px solid var(--border); 
            position: relative; 
        } 

        /* Linha de luz superior refinada */ 
        .card::before { 
            content: ''; 
            position: absolute; 
            top: -1px; left: 15%; 
            width: 70%; 
            height: 1px; 
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.3), transparent); 
        } 

        /* Wrapper do Logotipo Polido */ 
        .logo-wrapper { 
            width: 110px; 
            height: 110px; 
            margin: 0 auto 28px; 
            background: rgba(255, 255, 255, 0.02); 
            border-radius: 24px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 16px; 
            border: 1px solid var(--border); 
            box-shadow: 0 12px 24px -8px rgba(0,0,0,0.5);
            transition: all 0.5s ease;
        } 

        .logo-wrapper img { 
            max-width: 100%; 
            height: auto; 
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5)); 
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
        } 

        .card:hover .logo-wrapper {
            border-color: rgba(37, 99, 235, 0.3);
            background: rgba(37, 99, 235, 0.03);
            box-shadow: 0 16px 32px -8px rgba(37, 99, 235, 0.1);
        }

        .card:hover .logo-wrapper img { 
            transform: scale(1.05); 
        } 

        /* Tipografia Elegante */
        h1 {  
            font-size: 2rem;  
            font-weight: 800; 
            margin-bottom: 10px;  
            letter-spacing: -0.03em; 
            background: linear-gradient(to bottom, #ffffff 40%, #e2e8f0 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        } 

        p {  
            color: var(--text-muted);  
            margin-bottom: 36px;  
            font-size: 0.95rem;  
            line-height: 1.5;  
            font-weight: 500; 
            padding: 0 8px;
        } 

        /* Grupo de Botões e Listas */
        .btn-group {  
            display: flex;  
            flex-direction: column;  
            gap: 12px;  
        } 

        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 16px 20px; 
            border-radius: 16px; 
            font-weight: 600; 
            text-decoration: none; 
            font-size: 0.95rem; 
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1); 
            cursor: pointer;
        } 

        /* Botão Primário Neutro/Elevado */ 
        .btn-primary {  
            background: var(--primary);  
            color: white; 
            box-shadow: 0 4px 12px var(--primary-glow); 
        } 

        .btn-primary:hover { 
            background: #3b82f6; 
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.45); 
        } 

        /* Botão Secundário Minimalista */ 
        .btn-secondary { 
            background: rgba(255, 255, 255, 0.02); 
            color: #f1f5f9; 
            border: 1px solid var(--border); 
        } 

        .btn-secondary:hover { 
            background: rgba(255, 255, 255, 0.05); 
            border-color: var(--border-hover); 
            transform: translateY(-2px); 
        } 

        /* Feedbacks de Toque e Ícones */
        .btn:active { 
            transform: translateY(0) scale(0.98); 
        } 

        .btn .icon-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .btn i { 
            opacity: 0.4; 
            transition: transform 0.25s ease, opacity 0.25s ease; 
        } 
        
        .btn:hover i { 
            opacity: 1; 
        }

        .btn:hover .chevron {
            transform: translateX(3px);
        }

    </style> 
</head> 
<body> 

    <main class="card"> 
        <div class="logo-wrapper"> 
            <img src="https://github.com/danmaxy/atlas/blob/main/IMPERIUM.png?raw=true" alt="Logotipo Atlas"> 
        </div> 
         
        <header> 
            <h1>Central ATLAS</h1> 
            <p>Ecossistema de soluções integradas para o dia a dia técnico.</p> 
        </header> 

        <nav class="btn-group"> 
            <a href="#atendimento" class="btn btn-primary"> 
                <span class="icon-left">
                    <i data-lucide="monitor-remote"></i>
                    Serviços de Atendimento Remoto 
                </span>
                <i data-lucide="arrow-right" class="chevron" size="18"></i> 
            </a> 

            <a href="softwares.html" class="btn btn-secondary"> 
                <span class="icon-left">
                    <i data-lucide="folder-git"></i>
                    Repositório Softwares 
                </span>
                <i data-lucide="chevron-right" class="chevron" size="18"></i> 
            </a> 

            <a href="orcamentopc.html" class="btn btn-secondary"> 
                <span class="icon-left">
                    <i data-lucide="calculator"></i>
                    Orçamento PC 
                </span>
                <i data-lucide="chevron-right" class="chevron" size="18"></i> 
            </a> 

            <a class="btn btn-secondary" style="opacity: 0.85;"> 
                <span class="icon-left">
                    <i data-lucide="file-text"></i>
                    Gerar Ordem de Serviço 
                </span>
                <i data-lucide="plus" size="18"></i> 
            </a> 
        </nav> 
    </main> 

    <script> 
        // Inicializa os ícones Lucide 
        lucide.createIcons(); 
    </script> 
</body> 
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas - Soluções</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        /* Reset e Base */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
        }
        
        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #f8fafc;
        }

        /* Container Principal (Grid) */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 24px;
            width: 100%;
            max-width: 1000px;
        }

        /* Estilo dos Cards */
        .card {
            background: #1e293b;
            padding: 32px 24px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        .logo-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(37, 99, 235, 0.4));
        }

        /* Saudação no Menu */
        .welcome-msg {
            color: #3b82f6;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 8px; letter-spacing: -1px; }
        .subtitle { color: #94a3b8; font-size: 0.85rem; margin-bottom: 24px; }

        /* Botões */
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.25s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .btn-primary { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; }
        .btn-secondary { background: rgba(51, 65, 85, 0.5); color: #e2e8f0; border-color: #334155; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* Estilo do Fórum */
        .forum-header { margin-bottom: 15px; font-weight: 700; color: #f8fafc; font-size: 1.1rem; }
        
        #chat-window {
            flex-grow: 1;
            height: 380px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 15px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .msg { 
            margin-bottom: 12px; 
            font-size: 0.85rem; 
            padding: 10px 14px; 
            background: rgba(255,255,255,0.03); 
            border-radius: 12px; 
            border-left: 3px solid #3b82f6;
        }
        .msg b { color: #3b82f6; display: block; margin-bottom: 2px; text-transform: capitalize; }
        
        .msg-system {
            border-left-color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }
        .msg-system b { color: #10b981; }

        .chat-inputs { display: flex; flex-direction: column; gap: 8px; }
        
        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            outline: none;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .main-container { grid-template-columns: 1fr; }
            #chat-window { height: 300px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <main class="card">
            <div class="logo-container">
                <img src="https://github.com/danmaxy/atlas/blob/main/IMPERIUM.png?raw=true" alt="Logotipo Atlas">
            </div>
            
            <header>
                <div class="welcome-msg">Bem-vindo, Daniel</div>
                <h1>ATLAS</h1>
                <p class="subtitle">Sua central de soluções para técnicos.</p>
            </header>

            <nav class="btn-group">
                <a href="#servicos" class="btn btn-primary">Serviços</a>
                <a href="#pecas" class="btn btn-secondary">Peças</a>
                <a href="softwares.html" class="btn btn-secondary">Softwares</a>
            </nav>
        </main>

        <section class="card">
            <div class="forum-header">Fórum da Comunidade</div>
            <div id="chat-window">
                </div>
            
            <div class="chat-inputs">
                <input type="text" id="user-name" placeholder="Seu Nome" value="Daniel">
                <input type="text" id="chat-input" placeholder="Mensagem...">
                <button class="btn btn-primary" onclick="enviarMensagem()">Enviar</button>
            </div>
        </section>
    </div>

    <script>
        const ably = new Ably.Realtime('FegUDg.EPNgHQ:lvwThwk9SyQO5vJNzlqGXKQqEvIC2HOpBwn8Bv1hdZ0');
        const channel = ably.channels.get('forum-atlas');

        function saudacaoSistema() {
            const hora = new Date().getHours();
            let saudacao = "";
            
            if (hora >= 5 && hora < 12) saudacao = "Bom dia";
            else if (hora >= 12 && hora < 18) saudacao = "Boa tarde";
            else saudacao = "Boa noite";

            renderizarNaTela("Sistema", `${saudacao}! Bem-vindo à ATLAS. Explore nossos softwares e peças enquanto conversa com outros técnicos.`, true);
        }

        // 1. CARREGAR HISTÓRICO
        channel.history((err, resultPage) => {
            if (err) {
                console.warn("Histórico não disponível.");
                saudacaoSistema();
                return;
            }
            const messages = resultPage.items.reverse();
            messages.forEach(msg => {
                renderizarNaTela(msg.data.user, msg.data.text);
            });
            saudacaoSistema();
        });

        // 2. OUVIR NOVAS MENSAGENS
        channel.subscribe('mensagem', (message) => {
            renderizarNaTela(message.data.user, message.data.text);
        });

        function renderizarNaTela(usuario, texto, isSystem = false) {
            const chatWindow = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = isSystem ? 'msg msg-system' : 'msg';
            div.innerHTML = `<b>${usuario}:</b> ${texto}`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // 3. ENVIAR MENSAGEM
        function enviarMensagem() {
            const nameInput = document.getElementById('user-name');
            const msgInput = document.getElementById('chat-input');
            
            const name = nameInput.value.trim() || "Técnico";
            const text = msgInput.value.trim();

            if(text !== "") {
                channel.publish('mensagem', { user: name, text: text });
                msgInput.value = ""; 
            }
        }

        document.getElementById('chat-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') enviarMensagem();
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas - Soluções</title>
    <style>
        /* Reset e Base Modernizada */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
        }
        
        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #f8fafc;
        }

        /* Card com Glassmorphism leve */
        .card {
            background: #1e293b;
            width: 100%;
            max-width: 380px;
            padding: 40px 28px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* CONTAINER DA LOGO CORRIGIDO */
        .logo-container {
            width: 120px; /* Aumentado para melhor visualização */
            height: 120px;
            margin: 0 auto 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.05); /* Fundo sutilmente mais claro */
            border-radius: 24px;
            padding: 15px; /* Respiro interno para a logo não tocar nas bordas */
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .logo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Garante que a logo inteira apareça sem cortes */
            filter: drop-shadow(0 0 10px rgba(37, 99, 235, 0.4));
        }

        h1 { 
            font-size: 1.75rem; 
            font-weight: 700;
            margin-bottom: 8px; 
            letter-spacing: -0.025em; 
        }

        p { 
            color: #94a3b8; 
            margin-bottom: 32px; 
            font-size: 0.95rem; 
            line-height: 1.5;
        }

        /* Botões Estilizados */
        .btn-group { 
            display: flex; 
            flex-direction: column; 
            gap: 14px; 
        }

        .btn {
            display: block;
            padding: 16px;
            border-radius: 16px;
            font-weight: 600;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }

        /* Botão Secundário */
        .btn-secondary {
            background: rgba(51, 65, 85, 0.5);
            color: #e2e8f0;
            border: 1px solid #334155;
        }

        .btn-secondary:hover {
            background: #334155;
            border-color: #475569;
            transform: scale(1.02);
        }

        /* Botão Primário */
        .btn-primary { 
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); 
            color: white;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.4);
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .btn:active { 
            transform: scale(0.98); 
        }

    </style>
</head>
<body>

    <main class="card">
        <div class="logo-container">
            <img src="https://github.com/danmaxy/atlas/blob/main/IMPERIUM.png?raw=true" alt="Logotipo Atlas">
        </div>
        
        <header>
            <h1>Bem-vindo à ATLAS</h1>
            <p>Sua central de soluções direcionadas para técnicos.</p>
        </header>

        <nav class="btn-group">
            <a href="#servicos" class="btn btn-primary">Serviços</a>
            <a href="#pecas" class="btn btn-secondary">Peças</a>
            <a href="softwares.html" class="btn btn-secondary">Softwares</a>
        </nav>
    </main>

</body>
</html>

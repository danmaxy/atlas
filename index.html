<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas - Soluções Tecnológicas</title>
    <style>
        /* Reset e Base */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            background-color: #0f172a; /* Tom escuro moderno */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #f8fafc;
        }

        /* Card Principal */
        .card {
            background: #1e293b;
            width: 100%;
            max-width: 400px;
            padding: 40px 25px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            border: 1px solid #334155;
        }

        /* Logo/Ícone Atlas */
        .logo-container {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #38bdf8, #1d4ed8);
            border-radius: 20px;
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
        }

        h1 { font-size: 1.8rem; margin-bottom: 10px; letter-spacing: -0.5px; }
        p { color: #94a3b8; margin-bottom: 30px; font-size: 0.95rem; }

        /* Estilização dos Botões */
        .btn-group { display: flex; flex-direction: column; gap: 12px; }

        .btn {
            display: block;
            background: #334155;
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        /* Destaque nos botões ao interagir */
        .btn:active { transform: scale(0.97); background: #475569; }
        
        /* Botão de destaque (opcional, para o primeiro item) */
        .btn-primary { 
            background: #2563eb; 
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
        .btn-primary:active { background: #1d4ed8; }

    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">A</div>
        
        <h1>Bem-vindo à Atlas</h1>
        <p>Sua central de soluções técnicas e performance digital.</p>

        <div class="btn-group">
            <a href="#servicos" class="btn btn-primary">Serviços</a>
            <a href="#pecas" class="btn">Peças</a>
            <a href="#softwares" class="btn">Softwares</a>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Imperium - Tecnologia Sustentável</title>
    <style>
        /* Reset e Base */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            background-color: #f0f4f8; /* Fundo cinza-azulado muito claro */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Card Principal */
        .card {
            background: #ffffff;
            width: 100%;
            max-width: 420px; /* Um pouco mais largo para acomodar o logo */
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            text-align: center;
            border: 1px solid #e1e8ed;
        }

        /* Recriação do Logotipo ATLAS IMPERIUM (CSS) */
        .logo-container {
            position: relative;
            margin: 0 auto 30px;
            width: 140px; /* Largura total do conjunto */
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Faixa central preta */
        .logo-banner {
            background-color: #000000;
            color: #ffffff;
            padding: 8px 12px;
            border-radius: 4px;
            z-index: 10;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .logo-at {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .logo-imperium {
            font-size: 6px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 300;
            color: #ccc;
            margin-top: -2px;
        }

        /* O dragão como um grafismo radial minimalista */
        .dragon-swoosh {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            /* Gradiente em arco que lembra o movimento do dragão */
            background: conic-gradient(from 180deg, #1d4ed8 0deg, transparent 60deg, #1d4ed8 120deg, transparent 240deg);
            opacity: 0.15; /* Sutil */
            z-index: 1;
        }
        
        /* Círculo externo para estrutura */
        .dragon-swoosh::after {
            content: '';
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            background: #ffffff;
            border-radius: 50%;
        }

        /* Conteúdo do Texto */
        h1 { font-size: 1.6rem; color: #1e293b; margin-bottom: 8px; letter-spacing: -0.5px; }
        .tagline { font-size: 0.9rem; color: #1d4ed8; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        p { color: #64748b; margin-bottom: 30px; font-size: 0.95rem; line-height: 1.5; }

        /* Estilização dos Botões */
        .btn-group { display: flex; flex-direction: column; gap: 14px; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            color: #1e293b;
            text-decoration: none;
            padding: 18px 25px;
            border-radius: 16px;
            font-weight: 600;
            transition: all 0.2s ease;
            border: 1px solid #e1e8ed;
        }

        /* Ícone interno sutil (usando emojis para simplificar) */
        .btn-icon { font-size: 1.2rem; margin-right: 15px; }
        .btn-text { flex-grow: 1; text-align: left; }
        .btn-arrow { color: #cbd5e1; font-size: 0.8rem; }

        /* Interações */
        .btn:hover {
            border-color: #1d4ed8;
            box-shadow: 0 4px 12px rgba(29, 78, 216, 0.05);
        }

        .btn:active {
            transform: scale(0.98);
            background-color: #f8fafc;
        }

        /* Botão de Destaque (Principal Serviço) */
        .btn-primary { 
            background: #1d4ed8; 
            color: #ffffff;
            border-color: #1d4ed8;
            box-shadow: 0 6px 15px rgba(29, 78, 216, 0.15);
        }
        .btn-primary .btn-arrow { color: rgba(255,255,255,0.5); }
        .btn-primary:hover { background: #1a44c0; border-color: #1a44c0; }
        .btn-primary:active { background: #163da1; }

    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            <div class="dragon-swoosh"></div>
            <div class="logo-banner">
                <span class="logo-at">ATLAS</span>
                <span class="logo-imperium">IMPERIUM</span>
            </div>
        </div>
        
        <h1>Soluções em Tecnologia</h1>
        <div class="tagline">Reparo | Peças | Sustentabilidade</div>
        <p>Manutenção especializada de celulares, notebooks e computadores. Sua tecnologia de volta à vida, com responsabilidade.</p>

        <div class="btn-group">
            <a href="#servicos" class="btn btn-primary">
                <span class="btn-icon">🔧</span>
                <span class="btn-text">Serviços de Manutenção</span>
                <span class="btn-arrow">▶</span>
            </a>
            <a href="#pecas" class="btn">
                <span class="btn-icon">📦</span>
                <span class="btn-text">Venda de Peças</span>
                <span class="btn-arrow">▶</span>
            </a>
            <a href="#softwares" class="btn">
                <span class="btn-icon">♻️</span>
                <span class="btn-text">Reciclagem Eletrônica</span>
                <span class="btn-arrow">▶</span>
            </a>
        </div>
    </div>

</body>
</html>

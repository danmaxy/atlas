<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas - Soluções</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        /* Reset e Base */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
        }
        
        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #f8fafc;
        }

        /* Container Principal (Grid) */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 1.2fr; /* Fórum um pouco mais largo */
            gap: 24px;
            width: 100%;
            max-width: 1000px;
        }

        /* Estilo comum dos Cards */
        .card {
            background: #1e293b;
            padding: 32px 24px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        /* Coluna da Esquerda (Menu) */
        .logo-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(37, 99, 235, 0.4));
        }

        h1 { font-size: 1.5rem; margin-bottom: 8px; letter-spacing: -1px; }
        .subtitle { color: #94a3b8; font-size: 0.85rem; margin-bottom: 24px; }

        /* Botões */
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.25s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .btn-primary { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; }
        .btn-secondary { background: rgba(51, 65, 85, 0.5); color: #e2e8f0; border-color: #334155; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* Coluna da Direita (Fórum) */
        .forum-header { margin-bottom: 15px; font-weight: 700; color: #f8fafc; font-size: 1.1rem; }
        
        #chat-window {
            flex-grow: 1;
            height: 350px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 15px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .msg { 
            margin-bottom: 12px; 
            font-size: 0.85rem; 
            padding: 8px 12px; 
            background: rgba(255,255,255,0.03); 
            border-radius: 8px; 
        }
        .msg b { color: #3b82f6; display: block; margin-bottom: 2px; }

        .chat-inputs { display: flex; flex-direction: column; gap: 8px; }
        
        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            outline: none;
            font-size: 0.9rem;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .main-container { grid-template-columns: 1fr; }
            body { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <main class="card">
            <div class="logo-container">
                <img src="https://github.com/danmaxy/atlas/blob/main/IMPERIUM.png?raw=true" alt="Logotipo Atlas">
            </div>
            
            <header>
                <h1>ATLAS</h1>
                <p class="subtitle">Sua central de soluções para técnicos.</p>
            </header>

            <nav class="btn-group">
                <a href="#servicos" class="btn btn-primary">Serviços</a>
                <a href="#pecas" class="btn btn-secondary">Peças</a>
                <a href="softwares.html" class="btn btn-secondary">Softwares</a>
                <a href="#ajuda" class="btn btn-secondary">Suporte Técnico</a>
            </nav>
        </main>

        <section class="card">
            <div class="forum-header">Fórum da Comunidade</div>
            <div id="chat-window">
                <div class="msg"><b>Sistema:</b> Conectado ao canal global. Digite seu nome e participe!</div>
            </div>
            
            <div class="chat-inputs">
                <input type="text" id="user-name" placeholder="Seu Nome (Ex: Daniel)">
                <input type="text" id="chat-input" placeholder="Digite sua mensagem...">
                <button class="btn btn-primary" onclick="enviarMensagem()">Enviar</button>
            </div>
        </section>
    </div>

    <script>
        // Configuração do Ably
        const ably = new Ably.Realtime('FegUDg.EPNgHQ:lvwThwk9SyQO5vJNzlqGXKQqEvIC2HOpBwn8Bv1hdZ0');
        const channel = ably.channels.get('forum-atlas');

        // Escutar mensagens recebidas
        channel.subscribe('mensagem', (message) => {
            const chatWindow = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<b>${message.data.user}:</b> ${message.data.text}`;
            
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });

        // Função para enviar
        function enviarMensagem() {
            const nameInput = document.getElementById('user-name');
            const msgInput = document.getElementById('chat-input');
            
            const name = nameInput.value.trim() || "Técnico Anônimo";
            const text = msgInput.value.trim();

            if(text !== "") {
                // Publica no canal do Ably
                channel.publish('mensagem', { user: name, text: text });
                msgInput.value = ""; // Limpa apenas o campo de texto
            }
        }

        // Enviar com a tecla Enter
        document.getElementById('chat-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') enviarMensagem();
        });
    </script>

</body>
</html>
